<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>404 — Marginal Archive</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23050806'/%3E%3Ctext x='16' y='22' font-size='16' font-family='sans-serif' fill='%2300b87a' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/site.css"/>
<style>
  .error-page {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 24px;
    gap: 16px;
  }
  .error-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 96px;
    font-weight: 900;
    color: var(--primary-c);
    line-height: 1;
    opacity: 0.3;
  }
  .error-msg {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-p);
  }
  .error-desc {
    font-size: 14px;
    color: var(--text-m);
    max-width: 360px;
  }
  .error-link {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #03130d;
    background: var(--primary-c);
    padding: 10px 24px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .error-link:hover { opacity: 0.9; }
</style>
</head>
<body>

<nav class="topbar">
  <a href="/" class="logo">MARGINAL ARCHIVE</a>
</nav>

<main class="error-page">
  <span class="error-code">404</span>
  <p class="error-msg">Sayfa bulunamadı</p>
  <p class="error-desc">Aradığın sayfa kaldırılmış, taşınmış ya da hiç var olmamış olabilir.</p>
  <a href="/" class="error-link">Ana Sayfaya Dön</a>
</main>

</body>
</html>
