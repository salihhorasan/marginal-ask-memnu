<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş / Kayıt</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <main class="auth-box">
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Giriş</button>
      <button class="tab-btn" data-tab="register">Kayıt</button>
      <button class="tab-btn" data-tab="reset">Şifremi Unuttum</button>
    </div>

    <form id="login-form" class="tab-panel active">
      <input type="email" id="login-email" placeholder="E-posta" required>
      <input type="password" id="login-password" placeholder="Şifre" required>
      <button type="submit">Giriş Yap</button>
      <p class="message" id="login-message"></p>
    </form>

    <form id="register-form" class="tab-panel">
      <input type="text" id="register-username" placeholder="Kullanıcı adı" required>
      <input type="email" id="register-email" placeholder="E-posta" required>
      <input type="password" id="register-password" placeholder="Şifre (en az 6 karakter)" required minlength="6">
      <button type="submit">Kayıt Ol</button>
      <p class="message" id="register-message"></p>
    </form>

    <form id="reset-form" class="tab-panel">
      <input type="email" id="reset-email" placeholder="E-posta" required>
      <button type="submit">Sıfırlama Linki Gönder</button>
      <p class="message" id="reset-message"></p>
    </form>
  </main>

  <script type="module" src="js/auth-page.js"></script>
</body>
</html>
