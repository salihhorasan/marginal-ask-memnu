<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Giriş / Kayıt — Marginal Archive</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23050806'/%3E%3Ctext x='16' y='22' font-size='16' font-family='sans-serif' fill='%2300b87a' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;850;900&family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/site.css"/>
<link rel="stylesheet" href="css/auth.css"/>
</head>
<body class="auth-body">

<main class="auth-wrapper">

  <a href="index.html" class="auth-logo">MARGINAL ARCHIVE</a>

  <div class="auth-box">

    <div class="tabs">
      <button class="tab-btn active" data-tab="0">Giriş</button>
      <button class="tab-btn" data-tab="1">Kayıt</button>
      <button class="tab-btn" data-tab="2">Şifremi Unuttum</button>
    </div>

    <div class="panels-viewport">
      <div class="panels-track" data-active="0">

        <!-- Giriş -->
        <form id="login-form" class="tab-panel">
          <input type="email" id="login-email" placeholder="E-posta" autocomplete="email" required>
          <input type="password" id="login-password" placeholder="Şifre" autocomplete="current-password" required>
          <button type="submit">Giriş Yap</button>
          <p class="message" id="login-message"></p>
        </form>

        <!-- Kayıt -->
        <form id="register-form" class="tab-panel">
          <input type="text" id="register-username" placeholder="Kullanıcı adı" autocomplete="username" required>
          <input type="email" id="register-email" placeholder="E-posta" autocomplete="email" required>
          <input type="password" id="register-password" placeholder="Şifre (en az 6 karakter)" autocomplete="new-password" required minlength="6">
          <button type="submit">Kayıt Ol</button>
          <p class="legal-notice">Kayıt olarak <a href="hukuki.html#kosullar" target="_blank">Kullanım Koşulları</a>'nı ve <a href="hukuki.html#gizlilik" target="_blank">Gizlilik Politikası</a>'nı kabul etmiş olursunuz.</p>
          <p class="message" id="register-message"></p>
        </form>

        <!-- Şifre Sıfırlama -->
        <form id="reset-form" class="tab-panel">
          <input type="email" id="reset-email" placeholder="E-posta" autocomplete="email" required>
          <button type="submit">Sıfırlama Linki Gönder</button>
          <p class="message" id="reset-message"></p>
        </form>

      </div>
    </div>

  </div>

  <div class="auth-footer">
    <a href="hukuki.html#gizlilik">Gizlilik</a>
    <a href="hukuki.html#kosullar">Koşullar</a>
  </div>

</main>

<script type="module" src="js/auth-page.js"></script>
</body>
</html>
