<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video — Marginal Archive</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23050806'/%3E%3Ctext x='16' y='22' font-size='16' font-family='sans-serif' fill='%2300b87a' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/site.css"/>
<link rel="stylesheet" href="/css/video.css"/>
</head>
<body>

<!-- ══════════ TOP NAV ══════════ -->
<nav class="topbar">
  <a href="/" class="logo">MARGINAL ARCHIVE</a>
  <div class="nav-icons" id="auth-status">
    <!-- header.js dolduracak -->
  </div>
</nav>

<!-- ══════════ EPISODE RAIL ══════════ -->
<div class="episode-rail hide-scroll" id="episode-rail">
  <div class="episode-rail-track" id="episode-rail-track">
    <!-- video-detail.js dolduracak -->
  </div>
</div>

<!-- ══════════ MAIN LAYOUT ══════════ -->
<main class="main-layout">

  <!-- ── Video Section ── -->
  <div class="video-section">

    <!-- Prev / Next Nav Bar -->
    <div class="nav-bar" id="nav-bar">
      <!-- video-detail.js dolduracak -->
    </div>

    <!-- Başlık bloğu -->
    <div class="video-title-block" id="video-title-block">
      <h1 class="video-title" id="video-title">Yükleniyor…</h1>
      <p class="video-desc" id="video-desc"></p>
    </div>

    <!-- Video Player -->
    <div class="player-placeholder"></div>
    <div class="player-shell" id="player-shell">
      <video id="video-player"
        controls
        preload="auto"
        controlsList="nodownload noremoteplayback"
        disablepictureinpicture="false">
        Tarayıcınız video etiketini desteklemiyor.
      </video>
    </div>

  </div>

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar hide-scroll">

    <!-- Önemli Anlar Accordion -->
    <div class="accordion-block open" id="acc-moments">
      <div class="accordion-header" data-accordion="acc-moments">
        <span class="t-section-heading">Bölüm İçi Önemli Anlar</span>
        <span class="material-symbols-outlined accordion-arrow">expand_more</span>
      </div>
      <div class="accordion-body">
        <div class="accordion-inner">
          <div class="moment-list" id="moment-list">
            <p class="empty-state" id="moments-empty" style="display:none">Bu bölümde işaretlenmiş an yok.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Yorumlar Accordion -->
    <div class="accordion-block open" id="acc-comments">
      <div class="accordion-header" data-accordion="acc-comments">
        <span class="t-section-heading">Yorumlar</span>
        <span class="material-symbols-outlined accordion-arrow">expand_more</span>
      </div>
      <div class="accordion-body">
        <div class="accordion-inner">

          <!-- Yorum formu (login durumuna göre değişir) -->
          <div id="comment-form-area"></div>

          <!-- Yorum listesi -->
          <div class="comment-list" id="comment-list">
            <p class="empty-state" id="comments-empty" style="display:none">Henüz yorum yok, ilk yorumu sen yaz!</p>
          </div>

        </div>
      </div>
    </div>

  </aside>

</main>

<!-- ══════════ FOOTER ══════════ -->
<footer>
  <span class="footer-copy">© 2026 MARGINAL ARCHIVE</span>
  <div class="footer-links">
    <a href="/">Ana Sayfa</a>
    <a href="/hukuki#gizlilik">Gizlilik</a>
    <a href="/hukuki#kosullar">Koşullar</a>
  </div>
</footer>

<script type="module" src="/js/header.js"></script>
<script type="module" src="/js/video-detail.js"></script>
<script type="module" src="/js/comments.js"></script>
</body>
</html>
